<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Asqav Shadow AI Capture - Options</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        max-width: 28rem;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #555;
        font-size: 0.9rem;
        margin-top: 0;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: 600;
        font-size: 0.85rem;
      }
      input {
        width: 100%;
        padding: 0.5rem;
        font-size: 0.95rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-top: 0.25rem;
        box-sizing: border-box;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.5rem 1rem;
        background: #0f62fe;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: #0353e9;
      }
      .status {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: #006400;
      }
    </style>
  </head>
  <body>
    <h1>Asqav Shadow AI Capture</h1>
    <p>
      Configure the API key and synthetic agent ID issued by your Asqav admin.
      Metadata-only receipts are emitted to api.asqav.com when a managed user
      navigates to a known AI tool.
    </p>
    <form id="config-form">
      <label for="api-key">API Key</label>
      <input
        type="text"
        id="api-key"
        name="apiKey"
        autocomplete="off"
        spellcheck="false"
      />
      <label for="agent-id">Agent ID</label>
      <input
        type="text"
        id="agent-id"
        name="agentId"
        autocomplete="off"
        spellcheck="false"
      />
      <button type="submit">Save</button>
    </form>
    <div class="status" id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
